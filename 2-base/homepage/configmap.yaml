apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: apps
data:
  bookmarks.yaml: |
    - Infra:
        - Kubernetes:
            - href: https://kubernetes.io
        - Traefik:
            - href: https://doc.traefik.io/traefik/
        - K3s:
            - href: https://docs.k3s.io/

  services.yaml: |
    - Lab:
        - Homepage:
            href: http://192.168.1.50/
            description: Dashboard principal
        - Whoami:
            href: http://192.168.1.50/whoami
            description: Test de ingress
        - Vaultwarden:
            href: http://192.168.1.50:30080
            description: Gestor de contraseñas
        - Stirling PDF:
            href: http://192.168.1.50:30081
            description: Herramientas PDF
        - n8n:
            href: http://192.168.1.50:30083
            description: Automatización
        - cyberchef:
            href: http://192.168.1.50:30086
            description: Herramienta de análisis de datos
        - excalidraw:
            href: http://192.168.1.50:30085
            description: Herramienta de dibujo
        - drawio:
            href: http://192.168.1.50:30084
            description: Herramienta de diagramas
        - it-tools:
            href: http://192.168.1.50:30087
            description: Herramienta de IT
        - memos:
            href: http://192.168.1.50:30088
            description: Herramienta de notas

  widgets.yaml: |
    - resources:
        cpu: true
        memory: true
        disk: /

  docker.yaml: |
    []

  kubernetes.yaml: |
    mode: disabled

  settings.yaml: |
    title: K3s Swiss Army Lab
    headerStyle: clean
    layout:
      Lab:
        style: row
        columns: 3