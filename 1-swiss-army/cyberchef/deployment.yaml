apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberchef
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberchef
  template:
    metadata:
      labels:
        app: cyberchef
    spec:
      containers:
        - name: cyberchef
          image: mpepping/cyberchef:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cyberchef
  namespace: apps
spec:
  type: NodePort
  selector:
    app: cyberchef
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30086
