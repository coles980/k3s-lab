apiVersion: apps/v1
kind: Deployment
metadata:
  name: drawio
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drawio
  template:
    metadata:
      labels:
        app: drawio
    spec:
      containers:
        - name: drawio
          image: jgraph/drawio:latest
          ports:
            - containerPort: 8080
          env:
            - name: DRAWIO_SELF_CONTAINED
              value: "1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: drawio
  namespace: apps
spec:
  type: NodePort
  selector:
    app: drawio
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30084
