apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-tools
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: it-tools
  template:
    metadata:
      labels:
        app: it-tools
    spec:
      containers:
        - name: it-tools
          image: corentinth/it-tools:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: it-tools
  namespace: apps
spec:
  type: NodePort
  selector:
    app: it-tools
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30087
