apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling-pdf
  template:
    metadata:
      labels:
        app: stirling-pdf
    spec:
      containers:
        - name: stirling
          image: frooodle/s-pdf:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: DISABLE_SECURITY
              value: "true"
            - name: SECURITY_ENABLELOGIN
              value: "false"
            - name: SECURITY_INITIALLOGIN_USERNAME
              value: ""
            - name: SECURITY_INITIALLOGIN_PASSWORD
              value: ""
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx768m -XX:MaxMetaspaceSize=256m"
              
---
apiVersion: v1
kind: Service
metadata:
  name: stirling-pdf
  namespace: apps
spec:
  type: NodePort
  selector:
    app: stirling-pdf
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081