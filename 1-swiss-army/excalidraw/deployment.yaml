apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: excalidraw
  template:
    metadata:
      labels:
        app: excalidraw
    spec:
      containers:
        - name: excalidraw
          image: excalidraw/excalidraw:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: excalidraw
  namespace: apps
spec:
  type: NodePort
  selector:
    app: excalidraw
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30085
